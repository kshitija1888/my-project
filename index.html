<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BFHL · Node Graph Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0a0f;
    --surface:#111118;
    --border:#1e1e2e;
    --accent:#00ff9d;
    --accent2:#ff6b6b;
    --accent3:#6b9fff;
    --dim:#3a3a55;
    --text:#e0e0f0;
    --muted:#5a5a7a;
    --mono:'Space Mono',monospace;
    --sans:'Syne',sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--mono);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ── grid noise bg ──────── */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(0,255,157,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,157,.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* ── scanline overlay ──── */
  body::after{
    content:'';
    position:fixed;inset:0;
    background:repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.15) 2px,
      rgba(0,0,0,.15) 4px
    );
    pointer-events:none;
    z-index:0;
  }

  .wrapper{
    position:relative;z-index:1;
    max-width:960px;margin:0 auto;
    padding:2rem 1.5rem 4rem;
  }

  /* ── header ─────────────── */
  header{
    display:flex;align-items:center;gap:1rem;
    margin-bottom:3rem;
    border-bottom:1px solid var(--border);
    padding-bottom:1.5rem;
  }

  .logo{
    width:44px;height:44px;
    background:var(--accent);
    border-radius:6px;
    display:grid;place-items:center;
    flex-shrink:0;
  }
  .logo svg{width:26px;height:26px;}

  header h1{
    font-family:var(--sans);
    font-size:1.6rem;font-weight:800;
    letter-spacing:-.02em;
    color:#fff;
  }
  header h1 span{color:var(--accent);}

  .badge{
    margin-left:auto;
    font-size:.65rem;
    letter-spacing:.15em;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:.2rem .55rem;
    border-radius:2px;
    text-transform:uppercase;
    opacity:.7;
  }

  /* ── main card ──────────── */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:1.5rem;
  }

  .card-head{
    display:flex;align-items:center;gap:.6rem;
    padding:.7rem 1rem;
    border-bottom:1px solid var(--border);
    background:rgba(0,0,0,.3);
  }

  .dot{width:10px;height:10px;border-radius:50%;}
  .dot.r{background:#ff5f57;}
  .dot.y{background:#febc2e;}
  .dot.g{background:#28c840;}

  .card-head span{
    margin-left:.4rem;
    font-size:.75rem;color:var(--muted);
    letter-spacing:.08em;
  }

  /* ── url bar ─────────────── */
  .url-row{
    display:flex;align-items:center;gap:.6rem;
    padding:1rem 1.2rem;
    border-bottom:1px solid var(--border);
  }
  .url-label{
    font-size:.7rem;letter-spacing:.1em;
    color:var(--muted);text-transform:uppercase;
    white-space:nowrap;
  }
  .url-input{
    flex:1;
    background:rgba(0,255,157,.04);
    border:1px solid var(--dim);
    color:var(--accent3);
    font-family:var(--mono);
    font-size:.8rem;
    padding:.5rem .8rem;
    border-radius:5px;
    outline:none;
    transition:border .2s;
  }
  .url-input:focus{border-color:var(--accent3);}

  /* ── textarea ────────────── */
  .input-area{
    padding:1.2rem;
  }

  .input-label{
    font-size:.7rem;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;
    margin-bottom:.6rem;
    display:flex;align-items:center;gap:.5rem;
  }
  .input-label::after{
    content:'';flex:1;height:1px;background:var(--border);
  }

  textarea{
    width:100%;
    min-height:110px;
    background:rgba(0,0,0,.4);
    border:1px solid var(--dim);
    color:var(--text);
    font-family:var(--mono);
    font-size:.82rem;
    line-height:1.6;
    padding:.8rem 1rem;
    border-radius:6px;
    resize:vertical;
    outline:none;
    transition:border .2s;
  }
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--dim);}

  .hint{
    font-size:.68rem;color:var(--muted);
    margin-top:.5rem;line-height:1.5;
  }
  .hint code{color:var(--accent3);}

  /* ── submit btn ─────────── */
  .btn-row{
    padding:0 1.2rem 1.2rem;
    display:flex;gap:.8rem;align-items:center;
  }

  button{
    font-family:var(--mono);cursor:pointer;
    transition:all .18s;
  }

  .btn-run{
    display:flex;align-items:center;gap:.55rem;
    background:var(--accent);
    color:#000;
    font-size:.8rem;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;
    border:none;
    padding:.65rem 1.4rem;
    border-radius:5px;
  }
  .btn-run:hover{filter:brightness(1.15);}
  .btn-run:disabled{opacity:.4;cursor:not-allowed;}

  .btn-clear{
    background:transparent;
    border:1px solid var(--dim);
    color:var(--muted);
    font-size:.75rem;
    padding:.65rem 1rem;
    border-radius:5px;
  }
  .btn-clear:hover{border-color:var(--accent2);color:var(--accent2);}

  /* ── spinner ─────────────── */
  .spin{
    width:14px;height:14px;
    border:2px solid rgba(0,0,0,.3);
    border-top-color:#000;
    border-radius:50%;
    animation:spin .6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── error bar ───────────── */
  .error-bar{
    display:none;
    background:rgba(255,107,107,.1);
    border:1px solid rgba(255,107,107,.35);
    color:var(--accent2);
    font-size:.78rem;
    padding:.8rem 1rem;
    margin:0 1.2rem 1rem;
    border-radius:5px;
  }
  .error-bar.show{display:block;}

  /* ── results ─────────────── */
  #results{animation:fadeUp .4s ease both;}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:none;}
  }

  /* ── meta strip ─────────── */
  .meta-strip{
    display:flex;flex-wrap:wrap;gap:.5rem;
    padding:1rem 1.2rem;
    border-bottom:1px solid var(--border);
  }
  .meta-chip{
    font-size:.7rem;letter-spacing:.06em;
    padding:.3rem .7rem;
    border-radius:3px;
    border:1px solid;
  }
  .meta-chip.id{border-color:var(--accent3);color:var(--accent3);}
  .meta-chip.roll{border-color:var(--accent);color:var(--accent);}
  .meta-chip.email{border-color:var(--muted);color:var(--muted);}

  /* ── summary row ─────────── */
  .summary-row{
    display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
    background:var(--border);
    border-bottom:1px solid var(--border);
  }
  .stat-box{
    background:var(--surface);
    padding:1rem;
    text-align:center;
  }
  .stat-num{
    font-family:var(--sans);
    font-size:2rem;font-weight:800;
    color:var(--accent);
    line-height:1;
  }
  .stat-label{
    font-size:.65rem;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;
    margin-top:.3rem;
  }

  /* ── section head ──────── */
  .sec{padding:1rem 1.2rem;}
  .sec-title{
    font-size:.68rem;letter-spacing:.15em;
    color:var(--muted);text-transform:uppercase;
    margin-bottom:.8rem;
    display:flex;align-items:center;gap:.5rem;
  }
  .sec-title .count{
    background:var(--dim);color:var(--text);
    font-size:.6rem;padding:.1rem .4rem;
    border-radius:2px;
  }

  /* ── hierarchy cards ──── */
  .hier-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:.8rem;
  }

  .hcard{
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    transition:border-color .2s,transform .2s;
  }
  .hcard:hover{border-color:var(--accent);transform:translateY(-2px);}

  .hcard.cycle{border-color:rgba(255,107,107,.3);}
  .hcard.cycle:hover{border-color:var(--accent2);}

  .hcard-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.55rem .8rem;
    background:rgba(0,0,0,.3);
    border-bottom:1px solid var(--border);
  }
  .hcard-root{
    font-family:var(--sans);font-weight:800;
    font-size:1.1rem;color:#fff;
  }

  .badge-depth{
    font-size:.65rem;
    background:rgba(0,255,157,.1);
    color:var(--accent);
    border:1px solid rgba(0,255,157,.25);
    padding:.15rem .45rem;border-radius:2px;
  }
  .badge-cycle{
    font-size:.65rem;
    background:rgba(255,107,107,.1);
    color:var(--accent2);
    border:1px solid rgba(255,107,107,.25);
    padding:.15rem .45rem;border-radius:2px;
  }

  /* ── tree viz ─────────────── */
  .tree-wrap{
    padding:.7rem .8rem;
    font-size:.73rem;
    line-height:1.8;
    min-height:50px;
  }

  .tree-node{
    display:flex;flex-direction:column;
  }
  .tree-row{
    display:flex;align-items:center;gap:.3rem;
    color:var(--text);
  }
  .tree-row .node-label{
    background:rgba(107,159,255,.12);
    color:var(--accent3);
    border:1px solid rgba(107,159,255,.2);
    border-radius:3px;
    padding:.05rem .35rem;
    font-size:.72rem;
  }
  .tree-children{
    padding-left:1.2rem;
    border-left:1px dashed var(--dim);
    margin-left:.35rem;
  }
  .tree-connector{color:var(--dim);}

  /* ── tags (invalid/dup) ── */
  .tag-list{
    display:flex;flex-wrap:wrap;gap:.4rem;
  }
  .tag{
    font-size:.72rem;
    padding:.2rem .55rem;
    border-radius:3px;
  }
  .tag.inv{background:rgba(255,107,107,.1);color:var(--accent2);border:1px solid rgba(255,107,107,.2);}
  .tag.dup{background:rgba(254,188,46,.08);color:#febc2e;border:1px solid rgba(254,188,46,.2);}
  .tag.none{color:var(--dim);font-size:.72rem;}

  /* ── raw json toggle ─────── */
  .json-toggle{
    display:flex;align-items:center;gap:.4rem;
    background:transparent;
    border:1px solid var(--dim);
    color:var(--muted);
    font-size:.7rem;
    padding:.4rem .8rem;
    border-radius:4px;
    margin:.5rem 1.2rem 1rem;
  }
  .json-toggle:hover{border-color:var(--accent3);color:var(--accent3);}

  pre.json-raw{
    background:rgba(0,0,0,.5);
    border:1px solid var(--dim);
    color:var(--accent3);
    font-size:.7rem;
    line-height:1.5;
    padding:1rem;
    overflow-x:auto;
    margin:0 1.2rem 1.2rem;
    border-radius:6px;
    display:none;
  }
  pre.json-raw.show{display:block;}

  /* ── cycle notice ─────── */
  .cycle-notice{
    padding:.5rem .8rem;
    font-size:.7rem;
    color:var(--accent2);
    opacity:.7;
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- header -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round">
        <circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/>
        <line x1="7" y1="11" x2="17" y2="6"/><line x1="7" y1="13" x2="17" y2="18"/>
      </svg>
    </div>
    <div>
      <h1>BF<span>HL</span> Explorer</h1>
      <div style="font-size:.65rem;color:var(--muted);margin-top:.1rem;">Node hierarchy analyser · SRM Round 1</div>
    </div>
    <div class="badge">v1.0</div>
  </header>

  <!-- input card -->
  <div class="card" id="input-card">
    <div class="card-head">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span>POST /bfhl</span>
    </div>

    <div class="url-row">
      <span class="url-label">API Base URL</span>
      <input class="url-input" id="apiUrl" type="text" placeholder="https://your-app.herokuapp.com" value="http://localhost:3001"/>
    </div>

    <div class="input-area">
      <div class="input-label">data[ ]</div>
      <textarea id="nodeInput" placeholder='e.g. A->B, A->C, B->D, hello, X->Y, Y->Z, Z->X'></textarea>
      <div class="hint">
        Comma or newline separated · Valid format: <code>X->Y</code> (single uppercase letters) ·
        <code>A->A</code> = invalid · duplicates auto-detected
      </div>
    </div>

    <div class="error-bar" id="errorBar"></div>

    <div class="btn-row">
      <button class="btn-run" id="submitBtn" onclick="runQuery()">
        <svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span id="btnText">Run Query</span>
      </button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
      <button class="btn-clear" onclick="loadExample()">Load Example</button>
    </div>
  </div>

  <!-- results -->
  <div id="results"></div>

</div>

<script>
const EXAMPLE = `A->B, A->C, B->D, C->E, E->F,
X->Y, Y->Z, Z->X,
P->Q, Q->R,
G->H, G->H, G->I,
hello, 1->2, A->`;

function loadExample(){
  document.getElementById('nodeInput').value = EXAMPLE.trim();
}

function clearAll(){
  document.getElementById('nodeInput').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('errorBar').classList.remove('show');
}

function parseInput(raw){
  return raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
}

async function runQuery(){
  const btn  = document.getElementById('submitBtn');
  const icon = document.getElementById('btnIcon');
  const txt  = document.getElementById('btnText');
  const errB = document.getElementById('errorBar');
  const raw  = document.getElementById('nodeInput').value;
  const base = document.getElementById('apiUrl').value.replace(/\/+$/,'');

  errB.classList.remove('show');
  if(!raw.trim()){errB.textContent='⚠ Enter at least one node string.';errB.classList.add('show');return;}

  btn.disabled=true;
  icon.outerHTML=`<div class="spin" id="btnIcon"></div>`;
  txt.textContent='Running…';

  try{
    const res = await fetch(`${base}/bfhl`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:parseInput(raw)})
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const json = await res.json();
    renderResults(json);
  } catch(e){
    errB.textContent = '✗ ' + e.message;
    errB.classList.add('show');
  } finally{
    btn.disabled=false;
    document.getElementById('btnIcon').outerHTML=
      `<svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    txt.textContent='Run Query';
  }
}

/* ── tree renderer ─────────────────────────────── */
function renderTree(obj){
  if(!obj || Object.keys(obj).length===0) return '';
  function nodeHtml(key,children){
    const hasKids = Object.keys(children).length > 0;
    return `<div class="tree-node">
      <div class="tree-row">
        <span class="node-label">${key}</span>
        ${hasKids ? '<span class="tree-connector">→</span>':''}
      </div>
      ${hasKids ? `<div class="tree-children">${Object.entries(children).map(([k,v])=>nodeHtml(k,v)).join('')}</div>` : ''}
    </div>`;
  }
  return Object.entries(obj).map(([k,v])=>nodeHtml(k,v)).join('');
}

function renderResults(d){
  const trees  = d.hierarchies.filter(h=>!h.has_cycle);
  const cycles = d.hierarchies.filter(h=>h.has_cycle);

  let html = `<div class="card" id="result-card">
    <!-- meta -->
    <div class="meta-strip">
      <div class="meta-chip id">◈ ${d.user_id}</div>
      <div class="meta-chip email">${d.email_id}</div>
      <div class="meta-chip roll">${d.college_roll_number}</div>
    </div>

    <!-- summary numbers -->
    <div class="summary-row">
      <div class="stat-box">
        <div class="stat-num">${d.summary.total_trees}</div>
        <div class="stat-label">Trees</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--accent2)">${d.summary.total_cycles}</div>
        <div class="stat-label">Cycles</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--accent3)">${d.summary.largest_tree_root || '—'}</div>
        <div class="stat-label">Deepest Root</div>
      </div>
    </div>

    <!-- hierarchies -->
    <div class="sec">
      <div class="sec-title">Hierarchies <span class="count">${d.hierarchies.length}</span></div>
      <div class="hier-grid">
        ${d.hierarchies.map(h=>`
          <div class="hcard ${h.has_cycle?'cycle':''}">
            <div class="hcard-head">
              <span class="hcard-root">${h.root}</span>
              ${h.has_cycle
                ? `<span class="badge-cycle">⟳ cycle</span>`
                : `<span class="badge-depth">depth ${h.depth}</span>`}
            </div>
            <div class="tree-wrap">
              ${h.has_cycle
                ? `<div class="cycle-notice">Cyclic group — no tree structure</div>`
                : renderTree(h.tree)}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- invalid + duplicates -->
    <div class="sec" style="border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:1.2rem">
      <div>
        <div class="sec-title">Invalid Entries <span class="count">${d.invalid_entries.length}</span></div>
        <div class="tag-list">
          ${d.invalid_entries.length
            ? d.invalid_entries.map(e=>`<span class="tag inv">${e||'""'}</span>`).join('')
            : '<span class="tag none">none</span>'}
        </div>
      </div>
      <div>
        <div class="sec-title">Duplicate Edges <span class="count">${d.duplicate_edges.length}</span></div>
        <div class="tag-list">
          ${d.duplicate_edges.length
            ? d.duplicate_edges.map(e=>`<span class="tag dup">${e}</span>`).join('')
            : '<span class="tag none">none</span>'}
        </div>
      </div>
    </div>
  </div>

  <!-- raw json -->
  <button class="json-toggle" onclick="toggleRaw()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    View raw JSON
  </button>
  <pre class="json-raw" id="rawJson">${JSON.stringify(d,null,2)}</pre>`;

  const el = document.getElementById('results');
  el.innerHTML = html;
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='';
}

function toggleRaw(){
  document.getElementById('rawJson').classList.toggle('show');
}

// allow Enter key in url field to trigger submit
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.ctrlKey) runQuery();
});
</script>
</body>
</html>
